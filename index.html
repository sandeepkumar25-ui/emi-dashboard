<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Payment</title>

<style>

body{
    margin:0;
    padding:20px;   /* IMPORTANT: space add kiya */
    font-family:Arial;
    background:#f2f2f2;

    display:flex;
    justify-content:center;

    align-items:flex-start;  /* CENTER ki jagah TOP se start */

    min-height:100vh;
}

.card{
    background:white;
    width:350px;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0px 0px 15px rgba(0,0,0,0.1);

    margin-top:20px;  /* extra safety */
}

.qr{
    width:500px;
    max-width:100%;
    height:auto;

    display:block;
    margin:20px auto;
}

.btn{

    display:inline-block;

    background:#1877f2;

    color:white;

    padding:14px 35px;

    text-decoration:none;

    border-radius:10px;

    font-size:20px;
}

.btn:hover{
    background:#0d65d9;
}

</style>

</head>

<body>

<div class="card">

    <h1>EMI Payment</h1>

    <h2>Customer: Rahul Sharma</h2>

    <!-- <p><b>EMI Amount:</b> ₹2,500</p> -->

    <p><b>Due Date:</b> every 3rd of the month</p>

    <!-- QR IMAGE -->

    <img
    src="file:///D:/My_Windows/IT/myqr.png.jpeg"
    class="qr"
    >

    <br>

    <!-- PAY BUTTON -->

    <a
    class="btn"

    href="upi://pay?pa=yourupi@okhdfcbank&pn=Rahul Sharma&am=2500&cu=INR">

    Pay Now

    </a>

</div>

</body>

</html>
