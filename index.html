<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EMI Payment</title>

    <style>

        body{
            margin:0;
            padding:20px;
            font-family:Arial, sans-serif;
            background:#f2f2f2;

            display:flex;
            justify-content:center;
            align-items:flex-start;

            min-height:100vh;
        }

        .card{
            background:white;
            width:350px;
            padding:25px;
            border-radius:20px;
            text-align:center;
            box-shadow:0px 0px 15px rgba(0,0,0,0.1);

            margin-top:20px;
        }

        h1{
            color:#333;
            margin-bottom:10px;
        }

        h2{
            color:#555;
            font-size:22px;
            margin-bottom:20px;
        }

        p{
            font-size:18px;
            color:#444;
            margin:8px 0;
        }

        .qr{
            width:250px;
            max-width:100%;
            height:auto;

            display:block;
            margin:20px auto;

            border-radius:10px;
        }

        .note{
            font-size:14px;
            color:#777;
            margin-top:15px;
            line-height:22px;
        }

    </style>

</head>

<body>

    <div class="card">

        <h1>EMI Payment</h1>

        <!-- <h2>Barwala Leasing & Finance Private Limited</h2> -->

        <!-- <p><b>Payment Mode:</b> UPI</p>

        <p><b>Scan QR & Pay EMI</b></p> -->

        <!-- QR CODE -->

        <img
            src="QR.png"
            class="qr"
            alt="Company QR Code"
        >

        <p class="note">
            Scan this QR code using any UPI app like Google Pay,
            PhonePe, Paytm or BHIM.<br><br>

            <!-- Customer can enter EMI amount manually while paying. -->
        </p>

    </div>

</body>

</html>
